<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chess Game</title>
  <style>
    body { display: flex; justify-content: center; margin-top: 20px; }
    table { border-collapse: collapse; }
    td {
      width: 60px; height: 60px;
      text-align: center; vertical-align: middle;
      font-size: 40px; font-family: "Segoe UI Symbol";
      cursor: pointer;
    }
    .white { background: #eee; }
    .black { background: #666; color: white; }
    .selected { outline: 3px solid red; }
  </style>
</head>
<body>
  <table id="chessboard"></table>

  <script>
    const board = document.getElementById("chessboard");
    const pieces = {
      "R":"♖","N":"♘","B":"♗","Q":"♕","K":"♔","P":"♙",
      "r":"♜","n":"♞","b":"♝","q":"♛","k":"♚","p":"♟"
    };

    let gameState = [
      ["r","n","b","q","k","b","n","r"],
      ["p","p","p","p","p","p","p","p"],
      [".",".",".",".",".",".",".","."],
      [".",".",".",".",".",".",".","."],
      [".",".",".",".",".",".",".","."],
      [".",".",".",".",".",".",".","."],
      ["P","P","P","P","P","P","P","P"],
      ["R","N","B","Q","K","B","N","R"]
    ];

    let selectedCell = null;

    function drawBoard() {
      board.innerHTML = "";
      for (let i=0; i<8; i++) {
        const row = board.insertRow();
        for (let j=0; j<8; j++) {
          const cell = row.insertCell();
          cell.className = (i+j)%2===0 ? "white" : "black";
          cell.dataset.row = i;
          cell.dataset.col = j;
          const piece = gameState[i][j];
          cell.textContent = piece==="." ? "" : pieces[piece];
          cell.onclick = () => handleClick(cell);
        }
      }
    }

    function handleClick(cell) {
      if (!selectedCell) {
        selectedCell = cell;
        cell.classList.add("selected");
      } else {
        const sr = parseInt(selectedCell.dataset.row);
        const sc = parseInt(selectedCell.dataset.col);
        const er = parseInt(cell.dataset.row);
        const ec = parseInt(cell.dataset.col);

        // Move piece (no rule enforcement yet)
        gameState[er][ec] = gameState[sr][sc];
        gameState[sr][sc] = ".";
        selectedCell.classList.remove("selected");
        selectedCell = null;
        drawBoard();
      }
    }

    drawBoard();
  </script>
</body>
</html>
