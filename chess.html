<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Playable Chess with Rules + Checkmate</title>
  <style>
    body { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
    table { border-collapse: collapse; }
    td {
      width: 60px; height: 60px;
      text-align: center; vertical-align: middle;
      font-size: 40px; font-family: "Segoe UI Symbol";
      cursor: pointer;
    }
    .white { background: #eee; }
    .black { background: #666; color: white; }
    .selected { outline: 3px solid red; }
    #status { margin-top: 15px; font-size: 18px; }
  </style>
</head>
<body>
  <h2>Chess Game</h2>
  <table id="chessboard"></table>
  <div id="status"></div>

  <script>
    const board = document.getElementById("chessboard");
    const pieces = {
      "R":"♖","N":"♘","B":"♗","Q":"♕","K":"♔","P":"♙",
      "r":"♜","n":"♞","b":"♝","q":"♛","k":"♚","p":"♟"
    };

    let gameState = [
      ["r","n","b","q","k","b","n","r"],
      ["p","p","p","p","p","p","p","p"],
      [".",".",".",".",".",".",".","."],
      [".",".",".",".",".",".",".","."],
      [".",".",".",".",".",".",".","."],
      [".",".",".",".",".",".",".","."],
      ["P","P","P","P","P","P","P","P"],
      ["R","N","B","Q","K","B","N","R"]
    ];

    let selectedCell = null;
    let turn = "white"; // white moves first
    let gameOver = false;

    function drawBoard() {
      board.innerHTML = "";
      for (let i=0; i<8; i++) {
        const row = board.insertRow();
        for (let j=0; j<8; j++) {
          const cell = row.insertCell();
          cell.className = (i+j)%2===0 ? "white" : "black";
          cell.dataset.row = i;
          cell.dataset.col = j;
          const piece = gameState[i][j];
          cell.textContent = piece==="." ? "" : pieces[piece];
          cell.onclick = () => handleClick(cell);
        }
      }
      if (!gameOver) {
        document.getElementById("status").textContent = 
          (turn === "white" ? "White" : "Black") + " to move";
      }
    }

    function handleClick(cell) {
      if (gameOver) return;

      const r = parseInt(cell.dataset.row);
      const c = parseInt(cell.dataset.col);
      const piece = gameState[r][c];

      if (!selectedCell) {
        if (piece === ".") return;
        if (turn === "white" && piece === piece.toLowerCase()) return;
        if (turn === "black" && piece === piece.toUpperCase()) return;

        selectedCell = cell;
        cell.classList.add("selected");
      } else {
        const sr = parseInt(selectedCell.dataset.row);
        const sc = parseInt(selectedCell.dataset.col);
        const movingPiece = gameState[sr][sc];

        if (isValidMove(movingPiece, sr, sc, r, c)) {
          const target = gameState[r][c];
          // Prevent capturing own piece
          if (target !== ".") {
            if (turn === "white" && target === target.toUpperCase()) {
              alert("You cannot capture your own piece!");
              selectedCell.classList.remove("selected");
              selectedCell = null;
              return;
            }
            if (turn === "black" && target === target.toLowerCase()) {
              alert("You cannot capture your own piece!");
              selectedCell.classList.remove("selected");
              selectedCell = null;
              return;
            }
          }

          // Move or capture
          gameState[r][c] = movingPiece;
          gameState[sr][sc] = ".";
          turn = (turn === "white") ? "black" : "white";

          // Check for checkmate
          if (isCheckmate(turn)) {
            document.getElementById("status").textContent = 
              (turn === "white" ? "White" : "Black") + " is checkmated. Game over!";
            gameOver = true;
          }
        } else {
          alert("Invalid move for " + movingPiece);
        }

        selectedCell.classList.remove("selected");
        selectedCell = null;
        drawBoard();
      }
    }

    function isValidMove(piece, sr, sc, er, ec) {
      const dx = er - sr;
      const dy = ec - sc;

      switch(piece) {
        case "P": // White pawn
          if (dx === -1 && dy === 0 && gameState[er][ec] === ".") return true;
          if (sr === 6 && dx === -2 && dy === 0 && gameState[er][ec] === "." && gameState[sr-1][sc] === ".") return true;
          if (dx === -1 && Math.abs(dy) === 1 && gameState[er][ec] !== "." && gameState[er][ec] === gameState[er][ec].toLowerCase()) return true;
          return false;
        case "p": // Black pawn
          if (dx === 1 && dy === 0 && gameState[er][ec] === ".") return true;
          if (sr === 1 && dx === 2 && dy === 0 && gameState[er][ec] === "." && gameState[sr+1][sc] === ".") return true;
          if (dx === 1 && Math.abs(dy) === 1 && gameState[er][ec] !== "." && gameState[er][ec] === gameState[er][ec].toUpperCase()) return true;
          return false;
        case "R": case "r": // Rook
          if (sr === er || sc === ec) return pathClear(sr, sc, er, ec);
          return false;
        case "B": case "b": // Bishop
          if (Math.abs(dx) === Math.abs(dy)) return pathClear(sr, sc, er, ec);
          return false;
        case "Q": case "q": // Queen
          if (sr === er || sc === ec || Math.abs(dx) === Math.abs(dy)) return pathClear(sr, sc, er, ec);
          return false;
        case "K": case "k": // King
          return Math.abs(dx) <= 1 && Math.abs(dy) <= 1;
        case "N": case "n": // Knight
          return (Math.abs(dx) === 2 && Math.abs(dy) === 1) || (Math.abs(dx) === 1 && Math.abs(dy) === 2);
      }
      return false;
    }

    function pathClear(sr, sc, er, ec) {
      const dx = Math.sign(er - sr);
      const dy = Math.sign(ec - sc);
      let r = sr + dx, c = sc + dy;
      while (r !== er || c !== ec) {
        if (gameState[r][c] !== ".") return false;
        r += dx; c += dy;
      }
      return true;
    }

    function findKing(color) {
      const kingSymbol = color === "white" ? "K" : "k";
      for (let i=0; i<8; i++) {
        for (let j=0; j<8; j++) {
          if (gameState[i][j] === kingSymbol) return {row: i, col: j};
        }
      }
      return null;
    }

    function isSquareAttacked(row, col, attackerColor) {
      for (let i=0; i<8; i++) {
        for (let j=0; j<8; j++) {
          const piece = gameState[i][j];
          if (piece === ".") continue;
          if (attackerColor === "white" && piece === piece.toUpperCase()) {
            if (isValidMove(piece, i, j, row, col)) return true;
          }
          if (attackerColor === "black" && piece === piece.toLowerCase()) {
            if (isValidMove(piece, i, j, row, col)) return true;
          }
        }
      }
      return false;
    }

      const king = findKing(color);
      if (!king) return false;
